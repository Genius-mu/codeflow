<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0b" />

    <title>CodeFlow — GitHub Analytics Dashboard</title>
    <meta
      name="description"
      content="Explore any GitHub user's repositories, language mix, and commit activity at a glance. Built with React, TypeScript, and Tailwind."
    />

    <meta property="og:title" content="CodeFlow — GitHub Analytics Dashboard" />
    <meta
      property="og:description"
      content="Explore any GitHub user's repositories, language mix, and commit activity."
    />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CodeFlow" />
    <meta name="twitter:description" content="GitHub analytics at a glance." />

    <!-- 
      Apply theme before React hydrates to avoid flash-of-wrong-theme.
      Reads localStorage / OS preference, sets .light class on <html> if needed.
      Keep this script tiny and inline — it must run before the body renders.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("codeflow-theme");
          var theme =
            stored === "dark" || stored === "light"
              ? stored
              : window.matchMedia("(prefers-color-scheme: light)").matches
                ? "light"
                : "dark";
          if (theme === "light") {
            document.documentElement.classList.add("light");
          }
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          /* localStorage may be blocked in private mode — fall back to dark */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
